name: Deploy to VPS using PM2

on:
  push:
    branches: [ main ]  # Change this to your main branch name if different

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY_PRIVATE }}
        script_stop: true  # Stop script execution when an error occurs
        script: |
          # List home directory contents
          echo "Home directory contents:"
          ls -la ~
          
          # Check if apps directory exists
          if [ ! -d "~/apps" ]; then
            echo "Creating apps directory"
            mkdir -p ~/apps
          fi
          
          # Navigate to the apps directory
          cd ~/apps
          echo "Apps directory contents:"
          ls -la
          
          # Navigate to project directory or clone if not exists
          if [ ! -d "viagens-am" ]; then
            echo "Project directory doesn't exist. Cloning repository..."
            git clone https://github.com/yourusername/viagens-am.git
            cd viagens-am
          else
            cd viagens-am
            echo "Checking if directory is a git repository..."
            if [ ! -d ".git" ]; then
              echo "Directory is not a git repository. Initializing git..."
              git init
              git remote add origin https://github.com/yourusername/viagens-am.git
            fi
          fi
          
          echo "Current directory: $(pwd)"
          ls -la
          
          # Pull the latest changes
          echo "Pulling latest changes..."
          git pull origin main
          
          # Make sure Node.js environment is activated
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # Check Node.js version
          echo "Node.js version:"
          node -v
          echo "NPM version:"
          npm -v
          
          # Install dependencies
          echo "Installing dependencies..."
          npm install
          
          # Check if PM2 is available
          if ! command -v pm2 &> /dev/null; then
            echo "PM2 is not installed. Installing PM2 globally..."
            npm install -g pm2
          fi
          
          # Check for ecosystem.config.js
          if [ -f ecosystem.config.js ]; then
            echo "Found ecosystem.config.js, using it to start/reload the application"
            pm2 reload ecosystem.config.js --update-env
          else
            echo "No ecosystem.config.js found, using standard PM2 commands"
            # Check if the app is already running in PM2
            if pm2 list | grep -q "viagens-am"; then
              # Restart the application
              echo "Restarting existing PM2 process"
              pm2 restart viagens-am --update-env
            else
              # Start the application for the first time
              echo "Starting new PM2 process"
              pm2 start npm --name "viagens-am" -- start
            fi
          fi
          
          # Save PM2 process list
          echo "Saving PM2 process list"
          pm2 save
          
          # Display PM2 status
          echo "Current PM2 processes:"
          pm2 list